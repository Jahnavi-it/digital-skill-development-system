<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create account · Digital Skill Development System</title>
<link rel="stylesheet" href="assets/css/style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#12142B">
</head>
<body>
<div class="auth-shell">
  <div class="auth-card">
    <h2>Create your account</h2>
    <p class="sub">Start climbing the skill ladder today</p>

    <form id="register-form">
      <div class="field">
        <label for="name">Full name</label>
        <input type="text" id="name" required placeholder="Your name">
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="you@example.com">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="At least 6 characters" minlength="6">
      </div>
      <div class="field">
        <label for="role">I am a</label>
        <select id="role">
          <option value="student">Student / Learner</option>
          <option value="mentor">Mentor</option>
        </select>
      </div>
      <div class="form-msg" id="form-msg"></div>
      <button type="submit" class="btn btn-primary btn-block">Create account</button>
    </form>

    <div class="switch-line">Already have an account? <a href="login.html">Log in</a></div>
  </div>
</div>

<script src="assets/js/api.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/voice-assistant.js"></script>
<script src="assets/js/i18n.js"></script>
<script src="assets/js/pwa.js"></script>
</body>
</html>
